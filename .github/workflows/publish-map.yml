name: Build and Deploy Airport Map

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate map (with retry)
        run: |
          START_TIME=$(date +%s)
          for attempt in 1 2 3; do
            echo "Map generation attempt ${attempt}..."
            python airportcolorcode.py && break
            if [ "$attempt" -eq 3 ]; then
              echo "Map generation failed after 3 attempts"
              exit 1
            fi
            sleep 20
          done
          END_TIME=$(date +%s)
          ELAPSED=$((END_TIME - START_TIME))
          echo "Map generation completed in ${ELAPSED} seconds"
          cp airport_color_codes.html index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
